<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão Integrada - Endereços Gov</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .painel-unificado { display: flex; width: 100%; max-width: 1200px; margin: 0 auto; height: 100vh; }
        iframe { height: 100%; border: none; background-color: #ffffff; }
        .iframe-esq { flex: 0 0 40%; border-right: 1px solid #e0e0e0; }
        .iframe-dir { flex: 0 0 60%; }
    </style>
</head>
<body>

    <div class="painel-unificado">
        <iframe class="iframe-esq" src="composicao_familiar.html" title="Tela de Composição Familiar"></iframe>
        <iframe class="iframe-dir" id="frame-atualizacao" src="Atualizacao.html" title="Tela de Atualização de Dados"></iframe>
    </div>

    <script>
        // Roteador Universal de Mensagens 
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data || !data.acao) return;
            
            const frameDir = document.getElementById('frame-atualizacao');
            const frameEsq = document.querySelector('.iframe-esq');

            // Repassa o clique do CPF e o recarregamento para a tela da Direita
            if ((data.acao === 'mudarCPF' || data.acao === 'recarregarDados') && frameDir && frameDir.contentWindow) {
                frameDir.contentWindow.postMessage(data, '*');
            }
            
            // Repassa a confirmação do endereço para a tela da Esquerda (Faz o fade in/out acontecer)
            if (data.acao === 'atualizarVisual' && frameEsq && frameEsq.contentWindow) {
                frameEsq.contentWindow.postMessage(data, '*');
            }
        });
    </script>
</body>
</html>
